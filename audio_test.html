let current = null;
function play(name) {
  if (current) { current.pause(); current = null; }
  const s = document.getElementById('status');
  s.textContent = 'Loading...';
  current = new Audio(audios[name]);
  current.oncanplaythrough = () => s.textContent = '▶️ Playing ' + name + '...';
  current.onended = () => s.textContent = '✅ Done! Sound good?';
  current.onerror = (err) => s.textContent = '❌ Error: ' + (current.error ? current.error.message : 'unknown');
  current.play().catch(err => s.textContent = '❌ ' + err.message);
}
